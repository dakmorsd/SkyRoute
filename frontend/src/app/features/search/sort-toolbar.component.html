<div class="section-heading section-heading--compact">
  <div>
    <span class="eyebrow">Result Set</span>
    <h3 class="section-title section-title--small">{{ resultCount }} flights found</h3>
  </div>

  <div class="segmented" role="tablist" aria-label="Sort flights">
    @for (option of options; track option.value) {
    <button type="button" class="segmented__button" [class.is-active]="sort === option.value"
      (click)="sortChanged.emit(option.value)">
      {{ option.label }}
    </button>
    }
  </div>
</div>
